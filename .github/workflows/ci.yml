name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        config: [debug, release]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build & Validate (${{ matrix.config }})
        run: |
          swift build -c ${{ matrix.config }} --target MouseFix
          swift build -c ${{ matrix.config }} --target Preferences
          if [ '${{ matrix.config }}' = 'release' ]; then
            echo "=== .build structure ==="
            find .build -name MouseFix -o -name Preferences 2>/dev/null
            echo "=== show-bin-path ==="
            swift build -c ${{ matrix.config }} --show-bin-path
            BIN=$(find .build -name MouseFix -type f 2>/dev/null | head -1)
            if [ -z "$BIN" ]; then echo "Binary not found"; exit 1; fi
            "$BIN" --validate
          fi
