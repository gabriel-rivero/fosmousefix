name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        config: [debug, release]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build (${{ matrix.config }})
        run: swift build -c ${{ matrix.config }}
      - name: Validate (${{ matrix.config }})
        if: matrix.config == 'release'
        run: |
          BIN="$(swift build -c release --show-bin-path)/MouseFix"
          echo "Binary at: $BIN"
          "$BIN" --validate
