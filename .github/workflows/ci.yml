name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        config: [debug, release]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build daemon (${{ matrix.config }})
        run: swift build -c ${{ matrix.config }} --target MouseFix
      - name: Build Preferences (${{ matrix.config }})
        run: swift build -c ${{ matrix.config }} --target Preferences
      - name: Validate
        run: $(swift build -c ${{ matrix.config }} --show-bin-path)/MouseFix --validate
        if: matrix.config == 'release'
