name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        config: [debug, release]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build & Validate (${{ matrix.config }})
        run: |
          swift build -c ${{ matrix.config }} --target MouseFix
          swift build -c ${{ matrix.config }} --target Preferences
          if [ '${{ matrix.config }}' = 'release' ]; then
            BIN_DIR=$(swift build -c ${{ matrix.config }} --show-bin-path)
            "$BIN_DIR/MouseFix" --validate
          fi
