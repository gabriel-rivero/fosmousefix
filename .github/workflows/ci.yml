name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        config: [debug, release]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build (${{ matrix.config }})
        run: swift build -c ${{ matrix.config }}
      - name: Validate (${{ matrix.config }})
        if: matrix.config == 'release'
        run: |
          BIN=$(find .build -name MouseFix -type f 2>/dev/null | head -1)
          echo "Binary at: $BIN"
          "$BIN" --validate
